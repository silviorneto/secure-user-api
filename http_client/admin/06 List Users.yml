info:
  name: List Users (Admin)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/admin/users"
  auth:
    type: bearer
    token: "{{adminToken}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
