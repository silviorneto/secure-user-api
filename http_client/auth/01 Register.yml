info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/register"
  auth: none
  body:
    type: json
    data: |
      {
        "name": "Test User",
        "email": "newuser@test.com",
        "password": "User1234!"
      }

headers:
