info:
  name: Login User
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |
      {
        "email": "user@test.com",
        "password": "User1234!"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body.token) {
            bru.setVar("userToken", res.body.token);
          }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
