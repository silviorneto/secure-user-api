info:
  name: Update Profile
  type: http
  seq: 5

http:
  method: PUT
  url: "{{baseUrl}}/api/users/profile"
  auth: bearer
  body:
    type: json
    data: |
      {
        "name": "Updated Name"
      }

auth:
  bearer:
    token: "{{userToken}}"

headers:
  - name: Content-Type
    value: application/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
